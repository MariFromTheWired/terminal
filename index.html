<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="stylesheet.css">


<title>MAKINAMI BOARD</title>
</head>

<body>

<img class="makichan" id="makichan" src="mari_sus.gif"></img>

<header>

    <div class="modal" id="rulesModal">

    <div class="modalBox">

        <h2>Board Rules</h2>

        <div class="rulesText">

            • No spam<br>
            • No contenido ilegal<br>
            • No flooding<br>
            • Discutan de lo que quieran ☆

        </div>

        <button onclick="acceptRules()">
            ENTER
        </button>

    </div>

</div>

    <div class="logo">
        [/Mab/] - Makinami Board
    </div>

    <div class="subtitle">
        tablón de discusión anónimo hecho por Mari
    </div>

</header>

<!-- CREATE THREAD -->

<div class="postForm">

    <div class="formRow">
        <div class="formLabel">Name</div>

        <div class="formField">
            <input type="text" id="threadName" placeholder="ID única : &lt;Tu_Nombre&gt;#&lt;contraseña&gt;">
        </div>
    </div>

    <div class="formRow">
        <div class="formLabel">Subject</div>

        <div class="formField">
            <input type="text" id="threadSubject" placeholder="Título del Hilo">
        </div>
    </div>

    <div class="formRow">
        <div class="formLabel">Comment</div>

        <div class="formField">
            <textarea id="threadComment" placeholder="Descripción"></textarea>
        </div>
    </div>

    <button onclick="openRules()">
        Post
    </button>

</div>

<!-- BOARD -->

<div class="board" id="board"></div>

<footer>
    Futaba Inspired Design © 2026 by Mari 
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="script.js"></script>

</body>


</html>
